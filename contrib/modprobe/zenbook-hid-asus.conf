# Pin UX8406 Fn-lock to Mode B (Fn+F4 backlight) and disable Fn+Esc toggling.
# Installed as /etc/modprobe.d/zenbook-hid-asus.conf when using the oot module.
#
# Note: boot/sideload uses insmod, not modprobe — set fn_row_policy in
# /etc/conf.d/zenbook-kb-hid-asus (see contrib/openrc/conf.d/).

options hid_asus fn_lock_default=0 fn_lock_allow_toggle=1
# options hid_asus fn_row_policy=15
