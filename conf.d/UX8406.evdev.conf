# Zenbook Duo UX8406 family (2024 UX8406MA and similar).
# Playground: uncomment / edit lines, or override in ~/.config/zenbook-scripts/zenbook-hotkeys.conf
#
# Calibrate both fn-lock modes → union conf:
#   sudo rc-service zenbook-kb-hotkeys stop
#   sudo kb-calibrate-hotkeys --dual-fn-lock --quick

[profile]
board_name=UX8406
priority=10

[options]
usb_poll=auto
log_unmapped=true
# Vendor hotkeys: USB interface 4 (…004B). Interface 3 is consumer-only.
device_name=Asus Keyboard

[hotkeys]
# Keyboard backlight — bind by CODE (works in both fn-lock modes)
KEY_KBDILLUMUP = kb-brightness:+1
KEY_KBDILLUMDOWN = kb-brightness:-1
KEY_KBDILLUMTOGGLE = kb-brightness:toggle
# Do not bind KEY_F4 / KEY_FN_F4 — which key emits illum swaps with fn-lock.

# Display brightness (Fn+F5 decreases screen brightness on UX8406 — not fan mode)
# KEY_BRIGHTNESSDOWN = display-brightness:down
# KEY_BRIGHTNESSUP = display-brightness:up
# KEY_FN_F5 = display-brightness:down

# Fn+F8 / Fn+F9 / Fn+F10 after fn_row_policy swap (hid-asus emits these):
# Fn+F8 → KEY_F15 (screen swap). Uncomment after install of platform-screen-swap:
KEY_F15 = shell:platform-screen-swap
# Mic: leave KEY_MICMUTE unbound so Plasma can mute + show OSD.
# If Plasma has no "Microphone Mute" shortcut, uncomment:
# KEY_MICMUTE = audio:mic-mute
# Fn+F10 → KEY_RFKILL (pictogram = Bluetooth; rfkill bluetooth is fine):
KEY_RFKILL = rfkill:bluetooth

# Platform profile (quiet/balanced/performance) — no dedicated Fn key on UX8406;
# plan: kb-platform-profile CLI (see PLANNED.md). Optional bind if you find a spare key:
# KEY_PROG4 = shell:kb-platform-profile cycle

# Do NOT map volume / display / rfkill here if Fn+F1–F3 already work via kernel.
# Raw F3 → KEY_VOLUMEUP (115) with Fn-lock off is a firmware/kernel quirk; fix in
# hid-asus or toggle Fn-lock — not by binding KEY_VOLUMEUP in userspace.
#
# Meta+F1–F6 (screenpad / ASUS shortcuts) — add after --show-keys on your unit:
# KEY_PROG1 = shell:notify-send Meta+F1
# KEY_F13 = shell:notify-send screenpad-toggle

# Example remaps if your unit inverts Fn vs plain F keys (uncomment to test):
# KEY_F7 = ignore
# KEY_SWITCHVIDEOMODE = shell:your-display-toggle-command
