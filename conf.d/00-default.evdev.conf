# Base profile — loaded for every machine. Keep empty bindings unless universal.
# Higher-priority model files in this directory override these entries.

[profile]
priority=0

[options]
usb_poll=auto
log_unmapped=true
device_name=Zenbook Duo Keyboard

[hotkeys]
# Intentionally empty: only bind keys you want userspace to handle.
# Volume (F1–F3), display (F7), WLAN/BT (F9–F10) are usually handled by
# the kernel (hid-asus) and the desktop when Fn-lock is correct.

[usb_hotkeys]
# USB userspace polling is disabled automatically when hid-asus is loaded.
