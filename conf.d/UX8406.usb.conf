# USB vendor codes (interface 4) — fallback when hid-asus is not loaded.

[profile]
board_name=UX8406
priority=10

[options]
usb_poll=auto

[usb_hotkeys]
0xc4 = kb-brightness:+1
0xc5 = kb-brightness:-1
0xc7 = kb-brightness:toggle
0x10 = display-brightness:down
0x20 = display-brightness:up
0x7c = audio:mic-mute
0x88 = rfkill:wlan
