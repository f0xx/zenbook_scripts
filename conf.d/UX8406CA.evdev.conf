# UX8406CA (2025) — USB/BT IDs 0x1bf2 / 0x1bf3 when using hid-asus with those IDs.

[profile]
board_name=UX8406CA
priority=20

[options]
device_name=Asus Keyboard

[hotkeys]
KEY_KBDILLUMUP = kb-brightness:+1
KEY_KBDILLUMDOWN = kb-brightness:-1
KEY_KBDILLUMTOGGLE = kb-brightness:toggle
KEY_FN_F4 = kb-brightness:toggle
